log_level: warn

endpoints:
  - slug: drugnames
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/drugnames
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    refresh: "0 */6 * * *"
    ttl: "6h"

  - slug: spl-detail
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    query_params:
      setid: "{SETID}"

  - slug: spls
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    refresh: "0 */6 * * *"
    ttl: "6h"

  - slug: spls-by-name
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    query_params:
      drug_name: "{DRUGNAME}"

  - slug: spls-by-class
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    query_params:
      drug_class: "{DRUG_CLASS}"

  - slug: drugclasses
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/drugclasses.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    refresh: "0 */6 * * *"
    ttl: "6h"

  - slug: spl-xml
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls/{SETID}.xml
    format: raw

  # FDA openFDA Drug Endpoints

  - slug: fda-enforcement
    base_url: https://api.fda.gov
    path: /drug/enforcement.json
    format: json
    pagination_style: offset
    pagination: all
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    refresh: "0 3 * * *"
    ttl: "24h"

  - slug: fda-shortages
    base_url: https://api.fda.gov
    path: /drug/shortages.json
    format: json
    pagination_style: offset
    pagination: all
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    refresh: "0 3 * * *"
    ttl: "24h"

  - slug: fda-ndc
    base_url: https://api.fda.gov
    path: /drug/ndc.json
    format: json
    pagination_style: offset
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    search_params:
      - "brand_name:\"{BRAND_NAME}\""
      - "generic_name:\"{GENERIC_NAME}\""
      - "product_ndc:\"{NDC}\""

  - slug: fda-label
    base_url: https://api.fda.gov
    path: /drug/label.json
    format: json
    pagination_style: offset
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    search_params:
      - "openfda.brand_name:\"{BRAND_NAME}\""
      - "openfda.generic_name:\"{GENERIC_NAME}\""
      - "openfda.product_ndc:\"{NDC}\""