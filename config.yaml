log_level: warn

endpoints:
  - slug: drugnames
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/drugnames
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    refresh: "0 */6 * * *"
    ttl: "6h"

  - slug: spl-detail
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    query_params:
      setid: "{SETID}"

  - slug: spls
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    refresh: "0 */6 * * *"
    ttl: "6h"

  - slug: spls-by-name
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    query_params:
      drug_name: "{DRUGNAME}"

  - slug: spls-by-class
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    query_params:
      drug_class: "{DRUG_CLASS}"

  - slug: drugclasses
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/drugclasses.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
    refresh: "0 */6 * * *"
    ttl: "6h"

  - slug: spl-xml
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/spls/{SETID}.xml
    format: raw

  # FDA openFDA Drug Endpoints

  - slug: fda-enforcement
    base_url: https://api.fda.gov
    path: /drug/enforcement.json
    format: json
    pagination_style: offset
    pagination: all
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    refresh: "0 3 * * *"
    ttl: "24h"

  - slug: fda-shortages
    base_url: https://api.fda.gov
    path: /drug/shortages.json
    format: json
    pagination_style: offset
    pagination: all
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    refresh: "0 3 * * *"
    ttl: "24h"

  - slug: fda-ndc
    base_url: http://192.168.1.145:8081
    path: /api/openfda/ndc.json
    format: json
    pagination_style: offset
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    headers:
      X-API-Key: "${RXDAG_API_KEY}"
    search_params:
      - "brand_name:\"{BRAND_NAME}\""
      - "generic_name:\"{GENERIC_NAME}\""
      - "product_ndc:\"{NDC}\""
      - "pharm_class:\"{PHARM_CLASS}\""

  - slug: fda-label
    base_url: https://api.fda.gov
    path: /drug/label.json
    format: json
    pagination_style: offset
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    search_params:
      - "openfda.brand_name:\"{BRAND_NAME}\""
      - "openfda.generic_name:\"{GENERIC_NAME}\""
      - "openfda.product_ndc:\"{NDC}\""

  # rx-dag NDC Loader Endpoints (internal)
  # Requires RXDAG_API_KEY env var

  - slug: rx-dag-ndc-search
    base_url: http://192.168.1.145:8081
    path: /api/ndc/search
    format: json
    headers:
      X-API-Key: "${RXDAG_API_KEY}"
    query_params:
      q: "{Q}"
      limit: "{LIMIT}"
      offset: "{OFFSET}"

  - slug: rx-dag-ndc-lookup
    base_url: http://192.168.1.145:8081
    path: /api/ndc/{NDC}
    format: json
    headers:
      X-API-Key: "${RXDAG_API_KEY}"

  - slug: rx-dag-ndc-packages
    base_url: http://192.168.1.145:8081
    path: /api/ndc/{NDC}/packages
    format: json
    headers:
      X-API-Key: "${RXDAG_API_KEY}"

  # RxNorm API Endpoints (NLM)
  # No auth required, no pagination, monthly data updates

  - slug: rxnorm-find-drug
    base_url: https://rxnav.nlm.nih.gov
    path: /REST/rxcui.json
    format: json
    query_params:
      name: "{DRUG_NAME}"
      search: "1"
    data_key: idGroup.rxnormId
    ttl: "720h"

  - slug: rxnorm-approximate-match
    base_url: https://rxnav.nlm.nih.gov
    path: /REST/approximateTerm.json
    format: json
    query_params:
      term: "{DRUG_NAME}"
      maxEntries: "20"
      option: "1"
    data_key: approximateGroup.candidate
    ttl: "168h"

  - slug: rxnorm-spelling-suggestions
    base_url: https://rxnav.nlm.nih.gov
    path: /REST/spellingsuggestions.json
    format: json
    query_params:
      name: "{DRUG_NAME}"
    data_key: suggestionGroup.suggestionList.suggestion
    ttl: "720h"

  - slug: rxnorm-ndcs
    base_url: https://rxnav.nlm.nih.gov
    path: /REST/rxcui/{RXCUI}/ndcs.json
    format: json
    data_key: ndcGroup.ndcList.ndc
    ttl: "168h"

  - slug: rxnorm-generic-product
    base_url: https://rxnav.nlm.nih.gov
    path: /REST/rxcui/{RXCUI}/generic.json
    format: json
    data_key: minConceptGroup.minConcept
    ttl: "720h"

  - slug: rxnorm-all-related
    base_url: https://rxnav.nlm.nih.gov
    path: /REST/rxcui/{RXCUI}/allrelated.json
    format: json
    data_key: allRelatedGroup.conceptGroup
    flatten: true
    ttl: "336h"