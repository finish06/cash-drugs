name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -short -count=1

      - name: Integration tests
        env:
          MONGO_URI: mongodb://localhost:27017/drugs_test
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Coverage report
        env:
          MONGO_URI: mongodb://localhost:27017/drugs_test
        run: go tool cover -func=coverage.out | tail -1

      - name: Build
        run: go build ./cmd/server

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Determine version and tags
        id: meta
        run: |
          REGISTRY="dockerhub.calebdunn.tech"
          IMAGE="${REGISTRY}/finish06/cash-drugs"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "tags=${IMAGE}:beta" >> "$GITHUB_OUTPUT"
            echo "version=beta-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: dockerhub.calebdunn.tech
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          platforms: linux/amd64
