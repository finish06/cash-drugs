host: localhost:8080
info:
  contact: {}
  description: API cache/proxy — fetches from upstream REST APIs, stores in MongoDB,
    serves cached data to internal consumers.
  title: cash-drugs API
  version: 0.10.1
paths:
  /api/cache/{slug}:
    get:
      description: |-
        Returns cached upstream API data. Fetches from upstream if not cached.
        The response data shape depends on the upstream API. For example, the
        `drugclasses` endpoint returns objects with fields: `name` (string),
        `type` (string), `code` (string), `codingSystem` (string).
        Available query parameters vary by endpoint — use `GET /api/endpoints`
        to discover each endpoint's supported params (e.g. BRAND_NAME, GENERIC_NAME,
        NDC, PHARM_CLASS for fda-ndc; SETID for spl-detail).
      parameters:
      - description: Endpoint slug from config
        in: path
        name: slug
        required: true
        type: string
      - description: Path parameter value (varies by endpoint)
        in: query
        name: SETID
        type: string
      - description: Force upstream refresh (true/false)
        in: query
        name: _force
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_cash-drugs_internal_model.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_finish06_cash-drugs_internal_model.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/github_com_finish06_cash-drugs_internal_model.ErrorResponse'
        "503":
          description: Service overloaded or upstream circuit open
          schema:
            $ref: '#/definitions/github_com_finish06_cash-drugs_internal_model.ErrorResponse'
      summary: Get cached data for an endpoint
      tags:
      - cache
  /api/endpoints:
    get:
      description: Returns all configured upstream API endpoints with their metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.EndpointInfo'
            type: array
      summary: List configured endpoints
      tags:
      - system
  /api/warmup:
    post:
      consumes:
      - application/json
      description: 'Triggers background warm-up of cached endpoints. With no body,
        warms all scheduled endpoints. With {"slugs": [...]}, warms specific slugs.'
      parameters:
      - description: Optional slug filter
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "202":
          description: Warmup started
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid slug
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method not allowed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger cache warmup
      tags:
      - system
  /health:
    get:
      description: Returns service health status including database connectivity.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Degraded
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /openapi.json:
    get:
      description: Returns the OpenAPI 3.0 JSON specification for this API.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: OpenAPI specification
      tags:
      - system
  /ready:
    get:
      description: Returns whether the service has finished warming its cache.
      produces:
      - application/json
      responses:
        "200":
          description: Ready
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Warming
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - system
  /version:
    get:
      description: Returns build metadata, runtime info, and uptime for deployment
        verification.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.VersionInfo'
      summary: Version and build info
      tags:
      - system
swagger: "2.0"
